<!DOCTYPE html>
<html>

<head>

<title>Analysis Results</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/styles.css') }}">

</head>

<body>

<div class="container">

<h1>Analysis Results</h1>

<img src="/{{ image_path }}"
class="preview">

<div class="stats">

<h2>RGB Statistics</h2>

<table>

<tr>
<th>Channel</th>
<th>Min</th>
<th>Max</th>
<th>Mean</th>
<th>Variance</th>
</tr>

<tr>
<td>Red</td>
<td>{{ r_min }}</td>
<td>{{ r_max }}</td>
<td>{{ r_mean }}</td>
<td>{{ r_var }}</td>
</tr>

<tr>
<td>Green</td>
<td>{{ g_min }}</td>
<td>{{ g_max }}</td>
<td>{{ g_mean }}</td>
<td>{{ g_var }}</td>
</tr>

<tr>
<td>Blue</td>
<td>{{ b_min }}</td>
<td>{{ b_max }}</td>
<td>{{ b_mean }}</td>
<td>{{ b_var }}</td>
</tr>

</table>

</div>

<canvas id="chart"></canvas>

</div>

<script>

new Chart(document.getElementById('chart'), {

type: 'bar',

data: {

labels: ['Red','Green','Blue'],

datasets: [

{
label: 'Mean',
data: [
{{ r_mean }},
{{ g_mean }},
{{ b_mean }}
]
},

{
label: 'Variance',
data: [
{{ r_var }},
{{ g_var }},
{{ b_var }}
]
}

]

}

});

</script>

</body>

</html>
